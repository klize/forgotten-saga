name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # variants/*.jsx 는 public/variants/ 로 이동되어 vite 가 자동 복사함.
      # root assets/ 의 wordmark.png / wframe/ 등은 아직 public/ 에 없어
      # cp 로 docs/assets/ 에 머지 (동일 파일은 root assets/ 가 덮어씀).
      - run: cp -r assets docs/

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
