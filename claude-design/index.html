<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Forgotten Saga</title>
<style>
  :root {
    --fsaga-font: system-ui, -apple-system, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    --fsaga-mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    --fsaga-hi: #839bcb;
    --fsaga-gold: #ffc332;
    --fsaga-gold-dark: #aa8223;
    --fsaga-text: #d7d2e6;
    --fsaga-muted: #7873a0;
    --fsaga-bg: #121020;
  }
  html, body { margin: 0; padding: 0; background: #000; color: var(--fsaga-text);
    font-family: var(--fsaga-font); overflow-x: hidden; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="variants/monolith.jsx"></script>
  <script type="text/babel" src="variants/bgm-player.jsx"></script>

  <script type="text/babel" data-presets="react">
    const RELEASE = {
      version: "26.3.26.2234",
      date: "2026-03-26",
      download_url: "https://github.com/klize/forgotten-saga/releases/download/v26.3.26.2234/FSAGA_v26.3.26.2234.zip",
      release_url: "https://github.com/klize/forgotten-saga/releases/tag/v26.3.26.2234",
    };
    const BETA = {
      version: "26.4.11.2056-beta.5",
      date: "2026-04-12",
      download_url: "https://github.com/klize/forgotten-saga/releases/download/v26.4.11.2056-beta.5/FSAGA_v26.4.11.2056-beta.5.zip",
    };

    function App() {
      return (
        <div data-screen-label="01 Home">
          <MonolithVariant release={RELEASE} beta={BETA} />
          <BgmPlayer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
