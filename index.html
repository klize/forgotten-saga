<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FSAGA — Forgotten Saga Mod</title>
<meta name="description" content="포가튼사가(Forgotten Saga) 확장 모드 다운로드" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: #07060c;
    color: #e6e1d4;
    overflow: hidden;
  }
  #root { position: relative; }
  /* Subtle scrollbar inside monolith content panes */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,235,190,0.18); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,235,190,0.32); }

  /* Loading screen */
  .fsaga-boot {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #07060c;
    color: rgba(230,225,212,0.55);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase;
  }
</style>
</head>
<body>
  <div id="root"><div class="fsaga-boot">Loading · F · S · A · G · A</div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="variants/markdown.jsx"></script>
  <script type="text/babel" src="variants/bgm-player.jsx"></script>
  <script type="text/babel" src="variants/tweaks-panel.jsx"></script>
  <script type="text/babel" src="variants/monolith.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "solid-card",
      "betaPosition": "download-cell-sub"
    }/*EDITMODE-END*/;

    function FSAGAApp() {
      const [release, setRelease] = React.useState(null);
      const [beta, setBeta] = React.useState(null);
      const [ready, setReady] = React.useState(false);
      const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        const get = (path) => fetch(path).then(r => r.ok ? r.json() : Promise.reject()).catch(() => null);
        Promise.all([
          get('./public/release-info.json').then(d => d || get('./release-info.json')),
          get('./public/beta-release-info.json').then(d => d || get('./beta-release-info.json')),
          get('./public/patch-notes.json').then(d => d || get('./patch-notes.json')),
          get('./public/features.json').then(d => d || get('./features.json')),
          get('./public/install-guide.json').then(d => d || get('./install-guide.json')),
        ]).then(([rel, b, notes, features, install]) => {
          if (rel && rel.version && rel.version !== '0.0.0') setRelease(rel);
          if (b && b.version && b.version !== '0.0.0') setBeta(b);
          window.FSAGA_PATCH_NOTES = notes || [];
          window.FSAGA_FEATURES = features || [];
          window.FSAGA_INSTALL = install || { steps: [], notes: [] };
          setReady(true);
        });
      }, []);

      if (!ready || !window.MonolithVariant) {
        return <div className="fsaga-boot">Loading · F · S · A · G · A</div>;
      }
      const TP = window.TweaksPanel, TS = window.TweakSection, TSel = window.TweakSelect;
      return (
        <>
          <window.MonolithVariant
            release={release}
            beta={beta}
            theme={t.theme}
            betaPosition={t.betaPosition}
          />
          {window.BgmPlayer && <window.BgmPlayer />}
          {TP && (
            <TP title="Tweaks">
              <TS label="Color theme" />
              <TSel
                label="Theme"
                value={t.theme}
                options={[
                  { value: 'parchment-gold', label: 'Parchment + Gold' },
                  { value: 'inkblue-gold', label: 'Inkblue + Gold' },
                  { value: 'wine', label: 'Wine + Gold' },
                  { value: 'silver', label: 'Silver mono' },
                  { value: 'solid-card', label: 'Solid card menu' },
                ]}
                onChange={(v) => setTweak('theme', v)}
              />
              <TS label="Beta channel position" />
              <TSel
                label="Position"
                value={t.betaPosition}
                options={[
                  { value: 'inline-bar', label: '① Above Download cell' },
                  { value: 'topbar-badge', label: '② Top bar badge' },
                  { value: 'download-cell-sub', label: '③ Inside Download cell' },
                  { value: 'wordmark-row', label: '④ Wordmark row (stable + beta)' },
                  { value: 'footer', label: '⑤ Footer secondary link' },
                ]}
                onChange={(v) => setTweak('betaPosition', v)}
              />
            </TP>
          )}
        </>
      );
    }

    function mount() {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<FSAGAApp />);
    }

    let tries = 0;
    function waitAndMount() {
      if (window.MonolithVariant && window.FsagaMarkdown && window.BgmPlayer && window.useTweaks) {
        mount();
      } else if (tries++ < 80) {
        setTimeout(waitAndMount, 50);
      } else {
        mount();
      }
    }
    waitAndMount();
  </script>
</body>
</html>
